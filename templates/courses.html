<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cursos</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main_styles.css') }}" />
  </head>
  <body>
    <header class="main-header">
      <div class="logo">
        <img
          src="{{ url_for('static', filename='images/EriMar_Logo.webp') }}"
          alt="EriMar Studio"
          class="logo"
          width="250"
          height="150"
          loading="lazy"
          srcset="{{ url_for('static', filename='images/EriMar_Logo.webp') }} 1x, {{ url_for('static', filename='images/EriMar_Logo.webp') }} 2x"
        />
      </div>
      <div class="titulo-service-container">
        <h1 class="titulo-service">CURSOS</h1>
      </div>
      <nav class="navbar">
      <ul class="nav-links">
        <li><a href="{{ url_for('index') }}">INICIO</a></li>
        <li><a href="{{ url_for('index') }}#weare">NOSOTROS</a></li>
        <li class="menu-services">
          <a href="#services">SERVICIOS</a>
          <ul class="submenu">
            <li><a href="{{ url_for('service_nails') }}">UÑAS</a></li>
            <li><a href="{{ url_for('service_lashes') }}">PESTAÑAS</a></li>
            <li><a href="{{ url_for('service_capilar') }}">CAPILARES</a></li>
          </ul>
        </li>
        <li class="menu-promos">
          <a href="{{ url_for('promos') }}">PROMOCIONES</a>
        </li>
        <li><a href="{{ url_for('courses') }}">CURSOS</a></li>
        <li class="menu-contact">
          <a href="{{ url_for('index') }}#contact">CONTACTO</a>
          <ul class="submenu">
            <li>
              <a href="https://www.instagram.com/erimar_studio?igsh=MTY3dG0ZXVpN3g3ZQ==" target="_blank"
                >Instagram</a
              >
            </li>
            <li>
              <a href="https://www.facebook.com/share/1EdKyCcACA/" target="_blank"
                >Facebook</a
              >
            </li>
            <li>
              <a href="https://wa.me/524271668565" target="_blank">WhatsApp</a>
            </li>
          </ul>
        </li>
      </ul>
      <div class="cta-container">
        <a
          href="https://wa.me/524271668565?text=Hola%20quiero%20mas%20informacion%20sobre%20el%20curso"
          target="_blank"
          class="btn-reserva"
        >
          Reservar curso
        </a>
      </div>
      </nav>
    </header>
    <main>
      <section class="promos" id="promos">
        <div class="promos-container">
          <div class="promo-card promo-course-large">
            <h3>Curso pestañas</h3>
            <img src="/static/images/curso_pestañas.jpg" alt="curso pestañas"/>
            <div class="cta-container">
              <a
                href="https://wa.me/524271668565?text=Hola%20quiero%20agendar%20el%20curso%20de%20pestañas"
                class="btn-promo"
              >
                Quiero este curso
              </a>
            </div>
          </div>
        </div>
      </section>
    </main>
    <footer class="main-footer">
      <p>&copy; 2024 EriMar Studio. Todos los derechos reservados.</p>
    </footer>
    <script>
      document
        .querySelectorAll(
          ".menu-services > a, .menu-promos > a, .menu-contact > a"
        )
        .forEach((link) => {
          link.addEventListener("click", function (e) {
            const submenu = this.nextElementSibling;
            if (!submenu || !submenu.classList || !submenu.classList.contains("submenu")) {
              return;
            }
            e.preventDefault();

            if (submenu.style.display === "block") {
              submenu.style.display = "none";
              return;
            }

            document.querySelectorAll(".submenu").forEach((sub) => {
              sub.style.display = "none";
            });

            submenu.style.display = "block";
          });
        });
    </script>
  </body>
</html>
